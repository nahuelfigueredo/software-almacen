    async function loadUsers(){
      const userSelect = document.getElementById('userName');

      try {
        const response = await fetch('/api/users');
        if (!response.ok) throw new Error('Error al cargar usuarios');

        const data = await response.json();
        const users = data.data || [];

        userSelect.innerHTML = '<option value="">Seleccionar usuario...</option>';

        users.filter(u => u.active).forEach(user => {
          const option = document.createElement('option');
          option.value = user.name;
          option.textContent = `${user.name} (${roleLabel(user.role)})`;
          userSelect.appendChild(option);
        });
      } catch (error) {
        console.error('Error cargando usuarios:', error);
        // Fallback: usar usuarios del localStorage antiguo
        const users = App.getUsers();
        userSelect.innerHTML = '<option value="">Seleccionar usuario...</option>';
        users.filter(u => u.active !== false).forEach(user => {
          const option = document.createElement('option');
          option.value = user.name;
          option.textContent = `${user.name} (${roleLabel(user.role)})`;
          userSelect.appendChild(option);
        });
      }
    }

    loadUsers();

    async function doLogin(){
      const userName = document.getElementById('userName').value;
      const pinValue = pin.value.trim();

      if(!userName){
        App.toast('Seleccioná un usuario');
        return;
      }

      if(!pinValue){
        App.toast('Ingresá tu PIN');
        pin.focus();
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Ingresando...';

      try {
        const user = await authService.login(userName, pinValue);
        App.toast('Ingreso exitoso ✅');

        // Track login para demo
        try {
          await fetch('/api/track/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prospectId: user.id || user.name,
              role: user.role,
              name: user.name
            })
          });
        } catch (e) {
          console.warn('Track failed:', e);
        }

        // Redirigir según rol
        const target = nextParam || defaultNextFor(user);
        setTimeout(() => {
          location.replace('./' + String(target).replace(/^\.\//, ''));
        }, 300);

      } catch (error) {
        App.toast(error.message || 'Error al ingresar');
        pin.focus();
        pin.select();
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar';
      }
    }

    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', savedTheme);

    if (themeToggle) {
      themeToggle.addEventListener('click', () => {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        
        const icon = themeToggle.querySelector('.theme-toggle__icon');
        const label = themeToggle.querySelector('.theme-toggle__label');
        if (newTheme === 'dark') {
          icon.textContent = '☀️';
          label.textContent = 'Claro';
        } else {

          label.textContent = 'Oscuro';
