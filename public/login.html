<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ingresar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="./css/auth.css">
  <link rel="stylesheet" href="/assets/css/design-system.css">
</head>

<body class="auth-page bg-logo">
  <header class="top">
    <div class="wrap top__inner">
      <div class="brand">
        <div class="brand__logo" aria-hidden="true">A</div>
        <div>
          <div class="brand__name">Ingresar con PIN</div>
          <div class="brand__sub">Dueño / Admin / Vendedora</div>
        </div>
      </div>

      <div class="row">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <span class="theme-toggle__icon">🌙</span>
          <span class="theme-toggle__label">Oscuro</span>
        </button>
        <a class="btn" href="./index.html">Volver</a>
      </div>
    </div>
  </header>

  <main class="wrap auth-center" style="max-width:520px">
    <section class="section">
      <h2 style="margin:0 0 10px">PIN</h2>
      <div class="muted" style="margin-bottom:12px" id="nextLbl">—</div>

      <div class="row" style="gap:10px;align-items:end;flex-wrap:wrap">
        <div style="flex:1;min-width:220px">
          <label for="userName">Usuario</label>
          <select id="userName" class="input">
            <option value="">Seleccionar usuario...</option>
          </select>
        </div>
        <div style="flex:1;min-width:220px">
          <label for="pin">PIN</label>
          <input id="pin" class="pin-input" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="••••" />
        </div>
        <button class="btn btn--primary" id="btnLogin" type="button">Entrar</button>
      </div>

      <div class="muted" style="margin-top:10px">
        Enter para ingresar.
      </div>

      <div class="section" style="margin-top:14px;padding:12px" id="meBox" hidden>
        <div class="muted">Ya hay una sesión activa</div>
        <div style="margin-top:6px"><strong id="meLbl">—</strong></div>
        <div class="row" style="margin-top:12px;gap:10px;flex-wrap:wrap">
          <button class="btn btn--danger" id="btnLogout" type="button">Cerrar sesión</button>
          <button class="btn" id="btnContinue" type="button">Continuar</button>
        </div>
      </div>
    </section>
  </main>

  <script src="./assets/js/auth.js"></script>
  <script src="./js/app.js"></script>
  <script>
    App.ensureAuthSeed();

    function roleLabel(role){
      if(role === "owner") return "Dueño";
      if(role === "admin") return "Admin";
      if(role === "seller") return "Vendedora";
      return role || "-";
    }

    const pin = document.getElementById("pin");
    const btnLogin = document.getElementById("btnLogin");

    const meBox = document.getElementById("meBox");
    const meLbl = document.getElementById("meLbl");
    const btnLogout = document.getElementById("btnLogout");
    const btnContinue = document.getElementById("btnContinue");

    // ✅ si no viene next, mandamos según el rol (seller -> caja)
    const params = new URLSearchParams(location.search);
    const nextParam = params.get("next"); // puede venir null

    function defaultNextFor(me){
      if(me?.role === "seller") return "caja.html";
      return "index.html"; // admin/owner
    }

    function targetFromSession(){
      const me = authService.getCurrentUser();
      return nextParam || defaultNextFor(me);
    }

    function goNext(){
      const target = targetFromSession();
      location.replace("./" + String(target).replace(/^\.\//, ""));
    }

    document.getElementById("nextLbl").textContent =
      `Al ingresar vas a ir a: ${nextParam || "según tu usuario"}`;

    function renderSessionBox(){
      const user = authService.getCurrentUser();
      if(!user){
        meBox.hidden = true;
        return;
      }
      meLbl.textContent = `${user.name} (${roleLabel(user.role)})`;
      meBox.hidden = false;

      document.getElementById("nextLbl").textContent =
        `Al ingresar vas a ir a: ${nextParam || defaultNextFor(user)}`;
    }

    async function loadUsers(){
      const userSelect = document.getElementById('userName');

      try {
        const response = await fetch('/api/users');
        if (!response.ok) throw new Error('Error al cargar usuarios');

        const data = await response.json();
        const users = data.data || [];

        userSelect.innerHTML = '<option value="">Seleccionar usuario...</option>';

        users.filter(u => u.active).forEach(user => {
          const option = document.createElement('option');
          option.value = user.name;
          option.textContent = `${user.name} (${roleLabel(user.role)})`;
          userSelect.appendChild(option);
        });
      } catch (error) {
        console.error('Error cargando usuarios:', error);
        // Fallback: usar usuarios del localStorage antiguo
        const users = App.getUsers();
        userSelect.innerHTML = '<option value="">Seleccionar usuario...</option>';
        users.filter(u => u.active !== false).forEach(user => {
          const option = document.createElement('option');
          option.value = user.name;
          option.textContent = `${user.name} (${roleLabel(user.role)})`;
          userSelect.appendChild(option);
        });
      }
    }

    loadUsers();

    async function doLogin(){
      const userName = document.getElementById('userName').value;
      const pinValue = pin.value.trim();

      if(!userName){
        App.toast('Seleccioná un usuario');
        return;
      }

      if(!pinValue){
        App.toast('Ingresá tu PIN');
        pin.focus();
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Ingresando...';

      try {
        const user = await authService.login(userName, pinValue);
        App.toast('Ingreso exitoso ✅');

        // Track login para demo
        try {
          await fetch('/api/track/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prospectId: user.id || user.name,
              role: user.role,
              name: user.name
            })
          });
        } catch (e) {
          console.warn('Track failed:', e);
        }

        // Redirigir según rol
        const target = nextParam || defaultNextFor(user);
        setTimeout(() => {
          location.replace('./' + String(target).replace(/^\.\//, ''));
        }, 300);

      } catch (error) {
        App.toast(error.message || 'Error al ingresar');
        pin.focus();
        pin.select();
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar';
      }
    }

    btnLogin.addEventListener("click", doLogin);
    pin.addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){
        e.preventDefault();
        doLogin();
      }
    });

    btnLogout.addEventListener('click', async () => {
      await authService.logout();
      App.toast('Sesión cerrada');
      renderSessionBox();
      pin.focus();
    });

    btnContinue.addEventListener("click", goNext);

    renderSessionBox();
    setTimeout(()=>pin.focus(), 60);
  </script>
  <script>
    // ============================================
    // DARK MODE TOGGLE
    // ============================================

    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    // Get saved theme or default to light
    const savedTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', savedTheme);
    updateToggleButton(savedTheme);

    // Toggle theme on button click
    if (themeToggle) {
      themeToggle.addEventListener('click', () => {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';

        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateToggleButton(newTheme);
      });
    }

    // Update button icon and text
    function updateToggleButton(theme) {
      if (!themeToggle) return;

      const icon = themeToggle.querySelector('.theme-toggle__icon');
      const label = themeToggle.querySelector('.theme-toggle__label');

      if (theme === 'dark') {
        icon.textContent = '☀️';
        label.textContent = 'Claro';
      } else {
        icon.textContent = '🌙';
        label.textContent = 'Oscuro';
      }
    }
  </script>
</body>
</html>
