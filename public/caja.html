<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Caja - POS</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="/assets/css/design-system.css">
  
  <style>
    /* Estilos ultra-compactos para POS */
    .section {
      padding: 10px !important;
      margin-bottom: 8px !important;
    }

    .section__head {
      margin-bottom: 6px !important;
    }

    .section__title {
      margin: 0 0 3px 0 !important;
      font-size: 16px !important;
    }

    /* Búsqueda más compacta */
    .pos-add {
      gap: 6px !important;
      margin-bottom: 8px !important;
    }

    .pos-add__q label,
    .pos-add__qty label {
      margin-bottom: 3px !important;
      font-size: 12px !important;
      font-weight: 600 !important;
    }

    .pos-add__q input,
    .pos-add__qty input {
      padding: 5px 8px !important;
      font-size: 13px !important;
    }

    .pos-add__q .muted {
      margin-top: 3px !important;
      font-size: 11px !important;
    }

    .pos-add__btn button {
      padding: 6px 14px !important;
      font-size: 13px !important;
    }

    /* Resultados ultra-compactos */
    .pos-box {
      padding: 8px !important;
      margin-bottom: 8px !important;
    }

    .pos-box__head {
      padding: 6px 8px !important;
      margin-bottom: 6px !important;
    }

    .pos-results {
      max-height: 140px !important;
      overflow-y: auto !important;
      gap: 6px !important;
    }

    .pos-result {
      padding: 6px 8px !important;
    }

    .pos-result__name {
      font-size: 13px !important;
      margin-bottom: 2px !important;
    }

    .pos-result__meta {
      font-size: 11px !important;
    }

    /* Tabla del carrito con altura fija y scroll */
    .pos-box .table-wrap {
      max-height: 280px !important;
      overflow-y: auto !important;
      margin-bottom: 8px !important;
    }

    .table {
      font-size: 12px !important;
    }

    .table th {
      padding: 5px 6px !important;
      font-size: 11px !important;
      position: sticky !important;
      top: 0 !important;
      background: var(--card) !important;
      z-index: 2 !important;
    }

    .table td {
      padding: 4px 6px !important;
    }

    /* Botones en tabla más compactos */
    .table .btn {
      padding: 3px 8px !important;
      font-size: 11px !important;
    }

    /* Totales compactos */
    .totals {
      padding: 6px 8px !important;
      margin-bottom: 8px !important;
    }

    .totals__line {
      padding: 4px 0 !important;
      font-size: 13px !important;
    }

    .totals__line--total {
      font-size: 16px !important;
      padding: 6px 0 !important;
    }

    /* Grid de pagos compacto */
    .pay-grid {
      gap: 6px !important;
      margin: 8px 0 !important;
    }

    .pay-grid label {
      font-size: 12px !important;
      margin-bottom: 3px !important;
      font-weight: 600 !important;
    }

    .pay-grid input {
      padding: 5px 8px !important;
      font-size: 13px !important;
    }

    /* Botón cobrar destacado pero compacto */
    .pos-pay {
      margin-top: 8px !important;
      padding: 10px 18px !important;
      font-size: 15px !important;
      font-weight: 700 !important;
    }

    /* Optimizar columna derecha (aside) */
    .pos-aside {
      position: sticky !important;
      top: 70px !important;
    }

    /* Ajustar altura máxima de secciones en pantallas grandes */
    @media (min-width: 981px) {
      .split--pos > section:first-child {
        max-height: calc(100vh - 90px) !important;
        overflow-y: auto !important;
      }

      .pos-aside {
        max-height: calc(100vh - 90px) !important;
        overflow-y: auto !important;
      }
    }
  </style>
</head>

<body>
  <!-- Header -->
  <header class="top">
    <div class="top__left">
      <a href="./index.html" class="top__logo">
        <img src="./assets/img/logo2.svg" alt="Logo" width="32" height="32">
      </a>
      <h1 class="top__title">Caja</h1>
    </div>
    <div class="top__right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <span class="theme-toggle__icon">🌙</span>
        <span class="theme-toggle__label">Oscuro</span>
      </button>
      <span class="top__user">Usuario</span>
      <button class="btn btn--text" onclick="window.location.href='./login.html'">Salir</button>
    </div>
  </header>

  <nav class="nav">
    <a href="./index.html" class="nav__link">Dashboard</a>
    <a href="./caja.html" class="nav__link nav__link--active">Caja</a>
    <a href="./productos.html" class="nav__link">Productos</a>
    <a href="./reportes.html" class="nav__link">Reportes</a>
    <a href="./usuarios.html" class="nav__link">Usuarios</a>
    <a href="./precios.html" class="nav__link">Precios</a>
    <a href="./ajustes.html" class="nav__link">Ajustes</a>
  </nav>

  <!-- Contenido Principal -->
  <main class="main">
    <div class="split split--pos">
      
      <!-- Columna izquierda: Venta -->
      <section>
        <div class="section">
          <div class="section__head">
            <h3 class="section__title">Venta</h3>
          </div>

          <div class="pos-add">
            <div class="pos-add__q">
              <label for="qName">Buscar producto</label>
              <input id="qName" autocomplete="off" placeholder="Ej: azúcar, coca o escaneá un código..." />
              <div class="muted mt-8">
                Tip: Enter lo agrega · código de barras se agrega directo
              </div>
            </div>

            <div class="pos-add__qty">
              <label for="qQty">Cantidad</label>
              <input id="qQty" type="number" value="1" min="1" />
            </div>

            <div class="pos-add__btn">
              <button class="btn btn--primary" id="btnAdd">Agregar</button>
            </div>
          </div>
        </div>

        <!-- Resultados de búsqueda -->
        <div class="pos-box" id="resultsBox" style="display:none;">
          <div class="pos-box__head">
            <strong>Resultados</strong>
          </div>
          <div class="pos-results" id="resultsList">
            <!-- Se llenan dinámicamente -->
          </div>
        </div>
      </section>

      <!-- Columna derecha: Carrito y Cobro -->
      <aside class="pos-aside">
        <div class="section">
          <div class="section__head">
            <h3 class="section__title">Carrito</h3>
          </div>

          <div class="table-wrap">
            <table class="table" id="cartTable">
              <colgroup>
                <col style="width:45%">
                <col style="width:12%">
                <col style="width:18%">
                <col style="width:18%">
                <col style="width:7%">
              </colgroup>
              <thead>
                <tr>
                  <th>Producto</th>
                  <th>Cant.</th>
                  <th>Precio</th>
                  <th>Subtotal</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <!-- Se llena dinámicamente -->
              </tbody>
            </table>
          </div>

          <div class="totals">
            <div class="totals__line">
              <span>Subtotal:</span>
              <strong id="subtotal">$0.00</strong>
            </div>
            <div class="totals__line">
              <span>Descuento:</span>
              <strong id="discount">$0.00</strong>
            </div>
            <div class="totals__line totals__line--total">
              <span>Total:</span>
              <strong id="total">$0.00</strong>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section__head">
            <h3 class="section__title">Cobro</h3>
          </div>

          <div class="pay-grid">
            <div>
              <label for="payEfectivo">Efectivo</label>
              <input id="payEfectivo" type="number" placeholder="0.00" step="0.01" />
            </div>
            <div>
              <label for="payTarjeta">Tarjeta</label>
              <input id="payTarjeta" type="number" placeholder="0.00" step="0.01" />
            </div>
            <div>
              <label for="payTransferencia">Transferencia</label>
              <input id="payTransferencia" type="number" placeholder="0.00" step="0.01" />
            </div>
          </div>

          <button class="btn btn--primary btn--block pos-pay" id="btnCobrar">
            Cobrar
          </button>
        </div>
      </aside>

    </div>
  </main>

  <script>
    // Mock data
    const productos = [
      { id: 1, nombre: 'Coca Cola 2.25L', codigo: '7790001234567', precio: 450.00, stock: 50 },
      { id: 2, nombre: 'Azúcar Ledesma 1kg', codigo: '7790002345678', precio: 280.00, stock: 30 },
      { id: 3, nombre: 'Arroz Gallo Oro 1kg', codigo: '7790003456789', precio: 320.00, stock: 25 },
      { id: 4, nombre: 'Aceite Girasol Cocinero 900ml', codigo: '7790004567890', precio: 520.00, stock: 15 }
    ];

    let carrito = [];

    // Elementos DOM
    const qName = document.getElementById('qName');
    const qQty = document.getElementById('qQty');
    const btnAdd = document.getElementById('btnAdd');
    const resultsBox = document.getElementById('resultsBox');
    const resultsList = document.getElementById('resultsList');
    const cartTable = document.getElementById('cartTable').querySelector('tbody');
    const subtotalEl = document.getElementById('subtotal');
    const discountEl = document.getElementById('discount');
    const totalEl = document.getElementById('total');
    const btnCobrar = document.getElementById('btnCobrar');

    // Búsqueda
    qName.addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      if (q.length < 2) {
        resultsBox.style.display = 'none';
        return;
      }

      const results = productos.filter(p => 
        p.nombre.toLowerCase().includes(q) || 
        p.codigo.includes(q)
      );

      if (results.length > 0) {
        resultsList.innerHTML = results.map(p => `
          <div class="pos-result" data-id="${p.id}">
            <div class="pos-result__name">${p.nombre}</div>
            <div class="pos-result__meta">${p.codigo} · $${p.precio.toFixed(2)} · Stock: ${p.stock}</div>
          </div>
        `).join('');
        resultsBox.style.display = 'block';
      } else {
        resultsBox.style.display = 'none';
      }
    });

    // Click en resultado
    resultsList.addEventListener('click', (e) => {
      const resultEl = e.target.closest('.pos-result');
      if (!resultEl) return;
      const id = parseInt(resultEl.dataset.id);
      agregarAlCarrito(id);
      qName.value = '';
      resultsBox.style.display = 'none';
    });

    // Enter en búsqueda
    qName.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const results = resultsList.querySelectorAll('.pos-result');
        if (results.length > 0) {
          const id = parseInt(results[0].dataset.id);
          agregarAlCarrito(id);
          qName.value = '';
          resultsBox.style.display = 'none';
        }
      }
    });

    // Botón agregar
    btnAdd.addEventListener('click', () => {
      const results = resultsList.querySelectorAll('.pos-result');
      if (results.length > 0) {
        const id = parseInt(results[0].dataset.id);
        agregarAlCarrito(id);
        qName.value = '';
        resultsBox.style.display = 'none';
      }
    });

    // Agregar al carrito
    function agregarAlCarrito(id) {
      const producto = productos.find(p => p.id === id);
      if (!producto) return;

      const cantidad = parseInt(qQty.value) || 1;
      const itemExistente = carrito.find(item => item.id === id);

      if (itemExistente) {
        itemExistente.cantidad += cantidad;
      } else {
        carrito.push({ ...producto, cantidad });
      }

      renderCarrito();
      calcularTotales();
    }

    // Render carrito
    function renderCarrito() {
      cartTable.innerHTML = carrito.map(item => `
        <tr>
          <td>${item.nombre}</td>
          <td>${item.cantidad}</td>
          <td>$${item.precio.toFixed(2)}</td>
          <td>$${(item.precio * item.cantidad).toFixed(2)}</td>
          <td>
            <button class="btn btn--sm btn--danger" onclick="eliminarItem(${item.id})">×</button>
          </td>
        </tr>
      `).join('');
    }

    // Eliminar item
    function eliminarItem(id) {
      carrito = carrito.filter(item => item.id !== id);
      renderCarrito();
      calcularTotales();
    }

    // Calcular totales
    function calcularTotales() {
      const subtotal = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
      const descuento = 0;
      const total = subtotal - descuento;

      subtotalEl.textContent = `$${subtotal.toFixed(2)}`;
      discountEl.textContent = `$${descuento.toFixed(2)}`;
      totalEl.textContent = `$${total.toFixed(2)}`;
    }

    // Cobrar
    btnCobrar.addEventListener('click', () => {
      if (carrito.length === 0) {
        alert('El carrito está vacío');
        return;
      }

      const total = parseFloat(totalEl.textContent.replace('$', ''));
      const efectivo = parseFloat(document.getElementById('payEfectivo').value) || 0;
      const tarjeta = parseFloat(document.getElementById('payTarjeta').value) || 0;
      const transferencia = parseFloat(document.getElementById('payTransferencia').value) || 0;
      const pagado = efectivo + tarjeta + transferencia;

      if (pagado < total) {
        alert(`Falta pagar: $${(total - pagado).toFixed(2)}`);
        return;
      }

      const vuelto = pagado - total;
      alert(`Venta realizada!\nVuelto: $${vuelto.toFixed(2)}`);

      // Limpiar
      carrito = [];
      renderCarrito();
      calcularTotales();
      document.getElementById('payEfectivo').value = '';
      document.getElementById('payTarjeta').value = '';
      document.getElementById('payTransferencia').value = '';
    });
  </script>
  <script>
    // ============================================
    // DARK MODE TOGGLE
    // ============================================

    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    // Get saved theme or default to light
    const savedTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', savedTheme);
    updateToggleButton(savedTheme);

    // Toggle theme on button click
    if (themeToggle) {
      themeToggle.addEventListener('click', () => {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';

        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateToggleButton(newTheme);
      });
    }

    // Update button icon and text
    function updateToggleButton(theme) {
      if (!themeToggle) return;

      const icon = themeToggle.querySelector('.theme-toggle__icon');
      const label = themeToggle.querySelector('.theme-toggle__label');

      if (theme === 'dark') {
        icon.textContent = '☀️';
        label.textContent = 'Claro';
      } else {
        icon.textContent = '🌙';
        label.textContent = 'Oscuro';
      }
    }
  </script>
</body>
</html>
