<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Usuarios & PIN</title>
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="/assets/css/design-system.css">
</head>
<body>

<header class="top">
  <div class="wrap top__inner">
    <div class="brand">
      <div class="brand__logo">A</div>
      <div>
        <div class="brand__name">Usuarios & PIN</div>
        <div class="brand__sub">Solo Dueño</div>
      </div>
    </div>
    <div class="row">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <span class="theme-toggle__icon">🌙</span>
          <span class="theme-toggle__label">Oscuro</span>
        </button>
      <a class="btn" href="./index.html">Volver</a>
      <button class="btn btn--danger" id="btnLogout" type="button">Cerrar sesión</button>
    </div>
  </div>
</header>

<main class="wrap" style="max-width:980px">

  <section class="section" id="errorBox" style="display:none">
    <h3 style="margin:0 0 6px">Error</h3>
    <div class="muted" id="errorMsg">—</div>
  </section>

  <section class="section" id="noAccess" style="display:none">
    <h3 style="margin:0 0 6px">Sin acceso</h3>
    <div class="muted" style="margin-bottom:10px">
      Esta sección es solo para <strong>Dueño</strong>. Iniciá sesión con el PIN del Dueño.
    </div>
    <a class="btn btn--primary" href="./login.html?next=usuarios.html">Ir a login</a>
  </section>

  <section class="section" id="panel" style="display:none">
    <div class="row" style="justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
      <div>
        <h3 style="margin:0 0 6px">Gestión de usuarios</h3>
        <div class="muted">Cambiar PIN + activar/desactivar</div>
      </div>
      <div class="section" style="padding:10px;min-width:260px">
        <div class="muted">Sesión</div>
        <div><strong id="me">—</strong></div>
      </div>
    </div>

    <div style="overflow:auto;margin-top:12px">
      <table class="table" id="tbl">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Rol</th>
            <th>Estado</th>
            <th style="width:360px">Acciones</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <section class="section" style="margin-top:14px">
      <h3 style="margin:0 0 10px">Reset usuarios (solo si te trabaste)</h3>
      <div class="row" style="gap:10px;align-items:center;flex-wrap:wrap">
        <button class="btn" id="btnResetUsers" type="button">Recrear Dueño/Admin/Vendedor</button>
        <div class="muted">Borra usuarios actuales.</div>
      </div>
    </section>
  </section>

</main>

<script src="./js/app.js"></script>
<script src="./assets/js/auth.js"></script>
<script>
  if (typeof authService === 'undefined' || !authService.isAuthenticated()) {
    location.replace('./login.html?next=usuarios.html');
  }
</script>
<script>
(() => {
  const errorBox = document.getElementById("errorBox");
  const errorMsg = document.getElementById("errorMsg");
  const noAccess = document.getElementById("noAccess");
  const panel = document.getElementById("panel");
  const meEl = document.getElementById("me");
  const tbody = document.querySelector("#tbl tbody");

  function showError(msg){
    errorMsg.textContent = msg;
    errorBox.style.display = "";
    noAccess.style.display = "none";
    panel.style.display = "none";
  }

  function roleLabel(role){
    if(role === "owner") return "Dueño";
    if(role === "admin") return "Admin";
    if(role === "seller") return "Vendedor";
    return role;
  }

  function render(){
    const me = App.getMe();
    meEl.textContent = me ? `${me.name} (${roleLabel(me.role)})` : "Sin sesión";

    const users = App.getUsers();
    tbody.innerHTML = "";

    users.forEach(u => {
      const active = (u.active !== false);
      const isOwner = (u.role === "owner");

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><strong>${u.name}</strong></td>
        <td>${roleLabel(u.role)}</td>
        <td>${active ? "Activo" : "Inactivo"}</td>
        <td>
          <div class="row" style="gap:8px;flex-wrap:wrap">
            <button class="btn" data-pin="${u.id}" type="button">Cambiar PIN</button>
            <button class="btn ${active ? "btn--danger" : "btn--ok"}" data-toggle="${u.id}" type="button" ${isOwner ? "disabled" : ""}>
              ${active ? "Desactivar" : "Activar"}
            </button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });

    tbody.querySelectorAll("button[data-pin]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const id = btn.dataset.pin;
        const users = App.getUsers();
        const u = users.find(x => x.id === id);
        if(!u) return App.toast("Usuario no encontrado");

        const pin1 = prompt(`Nuevo PIN para ${u.name} (${roleLabel(u.role)}):`);
        if(pin1 === null) return;
        const pin = String(pin1).trim();

        try{
          App.updateUserPin(id, pin);
          App.toast("PIN actualizado ✅");
          render();
        }catch(err){
          App.toast(err.message || "Error");
        }
      });
    });

    tbody.querySelectorAll("button[data-toggle]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const id = btn.dataset.toggle;
        try{
          const active = App.toggleUserActive(id);
          App.toast(active ? "Activado ✅" : "Desactivado ✅");
          render();
        }catch(err){
          App.toast(err.message || "Error");
        }
      });
    });
  }

  try{
    document.getElementById("btnLogout").addEventListener("click", ()=>{
      App.logout();
      location.href = "./login.html?next=usuarios.html";
    });

    if(!window.App){
      showError("No se cargó App. Revisá que exista ./js/app.js");
      return;
    }

    App.ensureAuthSeed();

    const me = App.getMe();
    if(!me){
      noAccess.style.display = "";
      panel.style.display = "none";
      errorBox.style.display = "none";
      return;
    }

    if(me.role !== "owner"){
      noAccess.style.display = "";
      panel.style.display = "none";
      errorBox.style.display = "none";
      const txt = document.querySelector("#noAccess .muted");
      if(txt) txt.innerHTML = `Estás logueado como <strong>${me.name}</strong> (${roleLabel(me.role)}). Esta sección es solo para <strong>Dueño</strong>.`;
      return;
    }

    panel.style.display = "";
    noAccess.style.display = "none";
    errorBox.style.display = "none";
    render();

    document.getElementById("btnResetUsers").addEventListener("click", ()=>{
      if(!confirm("¿Recrear usuarios default? (perdés cambios y se cierra sesión)")) return;
      try{
        App.resetUsersToDefault();
        App.toast("Usuarios reseteados ✅");
        location.href = "./login.html?next=usuarios.html";
      }catch(err){
        App.toast(err.message || "Error");
      }
    });

  }catch(err){
    showError(err?.message || String(err));
    console.error(err);
  }
})();


</script>

  <script>
    // ============================================
    // DARK MODE TOGGLE
    // ============================================

    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    // Get saved theme or default to light
    const savedTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', savedTheme);
    updateToggleButton(savedTheme);

    // Toggle theme on button click
    if (themeToggle) {
      themeToggle.addEventListener('click', () => {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';

        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateToggleButton(newTheme);
      });
    }

    // Update button icon and text
    function updateToggleButton(theme) {
      if (!themeToggle) return;

      const icon = themeToggle.querySelector('.theme-toggle__icon');
      const label = themeToggle.querySelector('.theme-toggle__label');

      if (theme === 'dark') {
        icon.textContent = '☀️';
        label.textContent = 'Claro';
      } else {
        icon.textContent = '🌙';
        label.textContent = 'Oscuro';
      }
    }
  </script>
</body>
</html>
